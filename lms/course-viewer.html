<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Academy</title>
    <link rel="stylesheet" href="lms.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
</head>
<body>
    <div class="viewer-page">
        <header class="viewer-header">
            <a href="../index.html" class="back-link">&#8592; Courses</a>
            <a href="#" class="nav-arrow" id="prev-module" title="Previous session">&#8249;</a>
            <div class="viewer-title" id="viewer-title"></div>
            <a href="#" class="nav-arrow" id="next-module" title="Next session">&#8250;</a>
            <div class="viewer-slide-counter" id="viewer-counter"></div>
        </header>
        <div class="viewer-progress">
            <div class="viewer-progress-bar" id="viewer-progress-bar"></div>
        </div>
        <main class="viewer-layout">
            <div class="viewer-slides">
                <iframe id="slides-frame" allowfullscreen></iframe>
            </div>
            <aside class="viewer-sidebar">
                <div class="sidebar-header">
                    <h3>Materials</h3>
                </div>
                <div class="sidebar-body">
                    <nav class="sidebar-toc" id="sidebar-toc"></nav>
                    <div class="sidebar-content" id="sidebar-content">
                        <div class="sidebar-loading">Loading...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <button class="sidebar-toggle">Materials</button>
    <div class="sidebar-overlay"></div>

    <script src="course-data.js"></script>
    <script src="course-materials.js"></script>
    <script src="lms.js"></script>
</body>
</html>
